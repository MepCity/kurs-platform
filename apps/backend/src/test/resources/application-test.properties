spring.application.name=kurs-platform-backend-test
spring.datasource.url=jdbc:postgresql://localhost:5432/kurs_platform_test
spring.datasource.username=kurs_platform_test
spring.datasource.password=kurs_platform_test
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false
# Single shared credential for both migration and runtime in the test profile — the split in the
# default profile (see application.properties) exists to keep production's runtime connection off
# the migration-owner role, which isn't a concern for an ephemeral test database.
spring.flyway.url=jdbc:postgresql://localhost:5432/kurs_platform_test
spring.flyway.user=kurs_platform_test
spring.flyway.password=kurs_platform_test
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.flyway.default-schema=public
iam.token-hash-pepper=test-pepper-for-testcontainers-only-min-16-chars
iam.escrow-secret=test-escrow-secret-for-testcontainers-only-16
iam.local-stub-profile=true
iam.cognito.issuer=https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_testPool
iam.cognito.client-id=test-client-id-for-testcontainers
iam.cognito.region=eu-central-1
iam.cognito.user-pool-id=eu-central-1_testPool
iam.cognito.management-api.endpoint=https://cognito-idp.eu-central-1.amazonaws.com/
iam.cognito.management-api.access-key-id=test-access-key
iam.cognito.management-api.secret-access-key=test-secret-key
# IAM-004: scheduler stays OFF in tests — pollOnce() is exercised directly so tests stay
# deterministic and never wait on a timer. allow-federated-idp stays false (native V1 pool).
iam.cognito.allow-federated-idp=false
iam.provider-command.worker.enabled=false
iam.provider-command.worker.poll-interval=60s
iam.provider-command.worker.batch-limit=20
iam.provider-command.worker.lease-ttl=5m
iam.provider-command.retry.max-attempts=10
iam.provider-command.retry.backoff-base=10s
iam.provider-command.retry.backoff-max=15m
iam.provider-command.retry.jitter=0.25
