spring.application.name=kurs-platform-backend-local-stub
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kurs_platform}
spring.datasource.username=${DATABASE_USERNAME:kurs_platform}
spring.datasource.password=${DATABASE_PASSWORD:kurs_platform}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false
# Single shared local credential for both migration and runtime — good enough for a local
# developer sandbox; the migration/runtime split (see application.properties) is a
# staging/production hardening concern.
spring.flyway.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kurs_platform}
spring.flyway.user=${DATABASE_USERNAME:kurs_platform}
spring.flyway.password=${DATABASE_PASSWORD:kurs_platform}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.default-schema=public
iam.token-hash-pepper=${IAM_TOKEN_HASH_PEPPER:local-stub-pepper-for-development-only}
iam.escrow-secret=${IAM_ESCROW_SECRET:local-stub-escrow-secret-for-dev-only}
iam.local-stub-profile=true
iam.cognito.issuer=${IAM_COGNITO_ISSUER:https://cognito-idp.eu-central-1.amazonaws.com/eu-central-1_localStub}
iam.cognito.client-id=${IAM_COGNITO_CLIENT_ID:local-stub-client-id}
iam.cognito.region=${IAM_COGNITO_REGION:eu-central-1}
iam.cognito.user-pool-id=${IAM_COGNITO_USER_POOL_ID:eu-central-1_localStub}
iam.cognito.management-api.endpoint=${IAM_COGNITO_MANAGEMENT_API_ENDPOINT:https://cognito-idp.eu-central-1.amazonaws.com/}
iam.cognito.management-api.access-key-id=${IAM_COGNITO_MANAGEMENT_ACCESS_KEY_ID:local-stub-access-key}
iam.cognito.management-api.secret-access-key=${IAM_COGNITO_MANAGEMENT_SECRET_ACCESS_KEY:local-stub-secret-key}
iam.cognito.allow-federated-idp=false
# local-stub never runs the provider-command worker — the stub adapter would no-op every command,
# hiding real wiring bugs. Developers exercise pollOnce() via tests instead.
iam.provider-command.worker.enabled=false
iam.provider-command.worker.poll-interval=60s
iam.provider-command.worker.batch-limit=20
iam.provider-command.worker.lease-ttl=5m
iam.provider-command.retry.max-attempts=10
iam.provider-command.retry.backoff-base=10s
iam.provider-command.retry.backoff-max=15m
iam.provider-command.retry.jitter=0.25
