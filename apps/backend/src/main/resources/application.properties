spring.application.name=kurs-platform-backend
# Runtime datasource: the application connects AS iam_runtime, the least-privileged role V1
# migration creates (RLS-forced, column-scoped grants only) — it must never be the migration
# owner/superuser. No working default password: outside local-stub/test this must be supplied.
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/kurs_platform}
spring.datasource.username=${DATABASE_USERNAME:iam_runtime}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.auto-commit=false
# Migration datasource: a separate, more privileged connection (CREATEROLE/DDL rights) that only
# Flyway ever uses. Deliberately not defaulted for the same reason as the iam.* secrets below —
# see IamRuntimeCredentialSyncCallback for how iam_runtime's own login password gets kept in
# sync with spring.datasource.password without coupling it to a checksummed migration file.
spring.flyway.url=${DATABASE_MIGRATION_URL:}
spring.flyway.user=${DATABASE_MIGRATION_USERNAME:}
spring.flyway.password=${DATABASE_MIGRATION_PASSWORD:}
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=true
spring.flyway.default-schema=public
iam.token-hash-pepper=${IAM_TOKEN_HASH_PEPPER:}
iam.escrow-secret=${IAM_ESCROW_SECRET:}
iam.local-stub-profile=${IAM_LOCAL_STUB:false}
iam.cognito.issuer=${IAM_COGNITO_ISSUER:}
iam.cognito.client-id=${IAM_COGNITO_CLIENT_ID:}
iam.cognito.region=${IAM_COGNITO_REGION:eu-central-1}
iam.cognito.user-pool-id=${IAM_COGNITO_USER_POOL_ID:}
iam.cognito.management-api.endpoint=${IAM_COGNITO_MANAGEMENT_API_ENDPOINT:https://cognito-idp.eu-central-1.amazonaws.com/}
iam.cognito.management-api.access-key-id=${IAM_COGNITO_MANAGEMENT_ACCESS_KEY_ID:}
iam.cognito.management-api.secret-access-key=${IAM_COGNITO_MANAGEMENT_SECRET_ACCESS_KEY:}
iam.cognito.management-api.session-token=${IAM_COGNITO_MANAGEMENT_SESSION_TOKEN:}
# A-010 / ADR-004 gate: V1 is a native Cognito Essentials pool (sub == Username). Federation is V1
# out-of-scope; IamProperties.validate() hard-fails in real-env profiles if this is flipped on.
iam.cognito.allow-federated-idp=${IAM_COGNITO_ALLOW_FEDERATED_IDP:false}
# IAM-004 provider-command worker/scheduler. Disabled by default; a production deployment must
# consciously set IAM_PROVIDER_COMMAND_WORKER_ENABLED=true (per A-010) so dev/CI/staging boots
# never poll Cognito. Retry/backoff values are the safe defaults ProviderCommandRetryPolicy uses.
iam.provider-command.worker.enabled=${IAM_PROVIDER_COMMAND_WORKER_ENABLED:false}
iam.provider-command.worker.poll-interval=${IAM_PROVIDER_COMMAND_WORKER_POLL_INTERVAL:60s}
iam.provider-command.worker.batch-limit=${IAM_PROVIDER_COMMAND_WORKER_BATCH_LIMIT:20}
iam.provider-command.worker.lease-ttl=${IAM_PROVIDER_COMMAND_WORKER_LEASE_TTL:5m}
iam.provider-command.retry.max-attempts=${IAM_PROVIDER_COMMAND_RETRY_MAX_ATTEMPTS:10}
iam.provider-command.retry.backoff-base=${IAM_PROVIDER_COMMAND_RETRY_BACKOFF_BASE:10s}
iam.provider-command.retry.backoff-max=${IAM_PROVIDER_COMMAND_RETRY_BACKOFF_MAX:15m}
iam.provider-command.retry.jitter=${IAM_PROVIDER_COMMAND_RETRY_JITTER:0.25}
